name: Deploy to VPS

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Determine secret dynamically
        id: set-secret
        run: |
          BRANCH_UPPER=$(echo ${{github.ref_name}} | tr '[:lower:]' '[:upper:]')
          echo "branch_upper=$BRANCH_UPPER" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "nvm: $(command -v nvm || echo missing)"
            echo "node: $(command -v node || echo missing)"
            echo "yarn: $(command -v yarn || echo missing)"
            echo "pm2: $(command -v pm2 || echo missing)"
            echo "jq: $(command -v jq || echo missing)"

            nvm use --lts
            node -v
            yarn -v
            pm2 -v
            jq --version
          EOF
